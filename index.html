<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Europe Sponsor Jobs — International Visa Sponsorship Placement</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Uploadcare Widget -->
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js" charset="utf-8"></script>

    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js"
            }
        }
    </script>

    <style>
        /* ============================================================
           DESIGN TOKENS — Europe Sponsor Jobs: blue / white / maroon
           ============================================================ */
        :root {
            --blue-950: #06132b;
            --blue-900: #0A1F44;
            --blue-800: #0E2C5C;
            --blue-700: #133C79;
            --blue-600: #1B4F99;
            --blue-500: #2E68B8;
            --maroon-700: #6E0F1F;
            --maroon-600: #8A1226;
            --maroon-500: #A8172F;
            --maroon-400: #C42D45;
            --maroon-50: #FBEAEC;
            --emerald-600: #0F9D58;
            --emerald-500: #1ab46a;
            --emerald-50: #E8F7EE;
            --rose-600: #e11d48;
            --rose-50: #fce7eb;
            --amber-600: #D97706;
            --amber-50: #FEF3E2;
            --slate-900: #0F172A;
            --slate-800: #1E293B;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748B;
            --slate-400: #94A3B8;
            --slate-300: #CBD5E1;
            --slate-200: #E2E8F0;
            --slate-100: #F1F5F9;
            --slate-50: #F8FAFC;
            --bg: #F6F8FB;
            --white: #FFFFFF;
            --radius: 12px;
            --radius-lg: 18px;
            --shadow-sm: 0 1px 3px rgba(10, 31, 68, .06), 0 1px 2px rgba(10, 31, 68, .04);
            --shadow-md: 0 6px 20px rgba(10, 31, 68, .08);
            --shadow-lg: 0 20px 50px rgba(10, 31, 68, .14);
            --shadow-xl: 0 30px 70px rgba(10, 31, 68, .20);
            --font-head: 'Sora', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition: .25s cubic-bezier(.4, 0, .2, 1);
        }

        * { box-sizing: border-box; margin: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--slate-900);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }
        h1, h2, h3, h4, .font-head { font-family: var(--font-head); letter-spacing: -0.01em; }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        img, svg { display: block; }
        ::selection { background: var(--maroon-400); color: #fff; }
        :focus-visible { outline: 2px solid var(--maroon-500); outline-offset: 2px; }

        .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .grid { display: grid; gap: 24px; }
        .card { background: var(--white); border: 1px solid var(--slate-200); border-radius: var(--radius); box-shadow: var(--shadow-sm); transition: var(--transition); }
        .card:hover { box-shadow: var(--shadow-md); }
        .card-glow { border-color: var(--maroon-400); box-shadow: 0 0 0 1px rgba(168, 23, 47, .15), var(--shadow-md); }
        .pad { padding: 28px 30px; }
        .pad-sm { padding: 18px 20px; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; border: 1.5px solid transparent; transition: var(--transition); white-space: nowrap; line-height: 1.2; }
        .btn-primary { background: var(--blue-800); color: #fff; border-color: var(--blue-800); }
        .btn-primary:hover { background: var(--blue-700); border-color: var(--blue-700); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-maroon { background: var(--maroon-600); color: #fff; border-color: var(--maroon-600); }
        .btn-maroon:hover { background: var(--maroon-500); border-color: var(--maroon-500); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-outline { background: transparent; border-color: var(--slate-300); color: var(--slate-700); }
        .btn-outline:hover { border-color: var(--blue-600); background: var(--slate-50); color: var(--blue-800); }
        .btn-outline-light { background: transparent; border-color: rgba(255, 255, 255, .35); color: #fff; }
        .btn-outline-light:hover { background: rgba(255, 255, 255, .12); border-color: rgba(255, 255, 255, .6); }
        .btn-danger { background: var(--rose-50); color: var(--rose-600); border-color: #f5c6c6; }
        .btn-danger:hover { background: #fbdada; border-color: var(--rose-600); }
        .btn-success { background: var(--emerald-50); color: var(--emerald-600); border-color: #b8e6cc; }
        .btn-success:hover { background: #d4f0e3; border-color: var(--emerald-600); }
        .btn-google { background: #fff; color: var(--slate-800); border-color: var(--slate-300); }
        .btn-google:hover { background: var(--slate-50); border-color: var(--slate-400); }
        .btn-sm { padding: 8px 16px; font-size: 12.5px; }
        .btn-block { width: 100%; }
        .btn[disabled] { opacity: .5; cursor: not-allowed; pointer-events: none; }

        label { display: block; font-size: 12.5px; font-weight: 600; color: var(--slate-700); margin-bottom: 5px; }
        .req { color: var(--maroon-500); }

        input[type="text"], input[type="email"], input[type="tel"], input[type="password"], input[type="date"], input[type="number"], select, textarea {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--slate-200); border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; color: var(--slate-900); transition: var(--transition);
        }
        input:focus, select:focus, textarea:focus { border-color: var(--blue-500); outline: none; box-shadow: 0 0 0 3px rgba(46, 104, 184, .12); }
        textarea { resize: vertical; min-height: 90px; }

        .field { margin-bottom: 18px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .hint { font-size: 12px; color: var(--slate-500); margin-top: 5px; }
        .error-text { font-size: 12px; color: var(--maroon-500); margin-top: 4px; font-weight: 600; }
        .divider-or { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--slate-400); font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .divider-or::before, .divider-or::after { content: ""; flex: 1; height: 1px; background: var(--slate-200); }

        .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; padding: 4px 12px; border-radius: 100px; white-space: nowrap; text-transform: uppercase; letter-spacing: .02em; }
        .badge-blue { background: var(--blue-800); color: #fff; }
        .badge-maroon { background: var(--maroon-600); color: #fff; }
        .badge-green { background: var(--emerald-50); color: var(--emerald-600); }
        .badge-amber { background: var(--amber-50); color: var(--amber-600); }
        .badge-rose { background: var(--rose-50); color: var(--rose-600); }
        .badge-slate { background: var(--slate-100); color: var(--slate-700); }

        table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--slate-500); padding: 12px 16px; border-bottom: 2px solid var(--slate-200); font-weight: 700; }
        td { padding: 14px 16px; border-bottom: 1px solid var(--slate-100); vertical-align: middle; }
        tr:hover td { background: var(--slate-50); }

        #navbar { position: sticky; top: 0; z-index: 500; background: rgba(255, 255, 255, .94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--slate-200); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-weight: 800; font-size: 19px; color: var(--blue-900); }
        .brand-mark { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--blue-800), var(--maroon-600)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; box-shadow: var(--shadow-sm); flex-shrink: 0; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-link { padding: 9px 16px; border-radius: 8px; font-size: 13.5px; font-weight: 600; color: var(--slate-600); transition: var(--transition); }
        .nav-link:hover { background: var(--slate-100); color: var(--blue-900); }
        .nav-link.active { color: var(--blue-800); background: var(--slate-100); }
        .nav-cta { display: flex; align-items: center; gap: 10px; }
        .nav-mobile-toggle { display: none; background: none; border: none; font-size: 22px; color: var(--blue-800); padding: 8px; }

        @media (max-width: 900px) {
            .nav-links { position: fixed; top: 72px; left: 0; right: 0; background: #fff; flex-direction: column; align-items: stretch; padding: 12px 20px 20px; border-bottom: 1px solid var(--slate-200); box-shadow: var(--shadow-md); display: none; gap: 2px; }
            .nav-links.open { display: flex; }
            .nav-mobile-toggle { display: block; }
            .field-row { grid-template-columns: 1fr; }
        }

        .hero { position: relative; background: radial-gradient(1200px 600px at 10% -20%, #16407a 0%, transparent 65%), linear-gradient(155deg, var(--blue-950), var(--blue-800) 55%, var(--maroon-700)); color: #fff; overflow: hidden; }
        .hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(ellipse 900px 500px at 70% 20%, black, transparent 72%); pointer-events: none; }
        .hero-inner { position: relative; padding: 80px 24px 68px; display: grid; grid-template-columns: 1.2fr .8fr; gap: 48px; align-items: center; }
        .eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(196, 45, 69, .18); border: 1px solid rgba(196, 45, 69, .4); color: #F3B9C2; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 100px; margin-bottom: 20px; letter-spacing: .02em; text-transform: uppercase; }
        .hero h1 { font-size: 44px; line-height: 1.1; margin: 0 0 16px; font-weight: 800; }
        .hero h1 em { font-style: normal; color: #F3B9C2; }
        .hero .lead { font-size: 16.5px; color: #CBD9EB; max-width: 560px; margin: 0 0 28px; line-height: 1.7; }
        .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
        .hero-stats { display: flex; gap: 40px; flex-wrap: wrap; }
        .hero-stat b { display: block; font-family: var(--font-head); font-size: 26px; color: #fff; line-height: 1.2; }
        .hero-stat span { font-size: 12.5px; color: #9FB4CE; font-weight: 500; }

        .stamp-panel { position: relative; background: rgba(255, 255, 255, .06); border: 1px solid rgba(255, 255, 255, .14); border-radius: var(--radius-lg); padding: 28px 26px; backdrop-filter: blur(8px); }
        .stamp-panel h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: #9FB4CE; margin: 0 0 18px; }
        .stamp-row { display: flex; align-items: center; gap: 0; margin-bottom: 2px; }
        .stamp { width: 40px; height: 40px; border-radius: 50%; border: 2px dashed rgba(196, 45, 69, .6); display: flex; align-items: center; justify-content: center; color: #F3B9C2; font-size: 13px; flex: none; background: rgba(196, 45, 69, .1); font-weight: 700; }
        .stamp.done { border-style: solid; background: var(--maroon-500); color: #fff; }
        .stamp-line { flex: 1; height: 2px; background: repeating-linear-gradient(90deg, rgba(255, 255, 255, .2) 0 6px, transparent 6px 12px); }

        .section { padding: 72px 24px; }
        .section-sm { padding: 48px 24px; }
        .section-head { text-align: center; max-width: 660px; margin: 0 auto 44px; }
        .section-head .eyebrow { background: var(--slate-100); border-color: var(--slate-200); color: var(--blue-700); }
        .section-head h2 { font-size: 32px; margin: 0 0 10px; color: var(--blue-900); }
        .section-head p { color: var(--slate-500); font-size: 15.5px; margin: 0; }
        .section-alt { background: var(--white); border-top: 1px solid var(--slate-200); border-bottom: 1px solid var(--slate-200); }

        .country-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .country-card { border-radius: var(--radius-lg); overflow: hidden; background: var(--white); border: 1px solid var(--slate-200); box-shadow: var(--shadow-sm); transition: var(--transition); }
        .country-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); border-color: var(--maroon-400); }
        .country-flagbar { height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; color: #fff; font-family: var(--font-head); font-weight: 700; font-size: 18px; position: relative; background: linear-gradient(135deg, var(--blue-800), var(--blue-600)); }
        .country-flagbar .flag-img { width: 36px; height: 24px; border-radius: 3px; object-fit: cover; box-shadow: 0 1px 4px rgba(0, 0, 0, .2); }
        .country-body { padding: 22px 22px 24px; }
        .country-body ul { margin: 0 0 16px; padding: 0; list-style: none; }
        .country-body li { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--slate-700); margin-bottom: 7px; }
        .country-body li i { color: var(--emerald-600); margin-top: 3px; font-size: 12px; flex-shrink: 0; }
        .country-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid var(--slate-100); }
        .country-foot .count { font-size: 12.5px; color: var(--slate-500); font-weight: 600; }

        .job-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .job-card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); padding: 22px; transition: var(--transition); }
        .job-card:hover { border-color: var(--blue-500); box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .job-cat-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--slate-100); color: var(--blue-800); display: flex; align-items: center; justify-content: center; font-size: 17px; margin-bottom: 14px; }
        .job-title { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--blue-900); margin: 0 0 6px; }
        .job-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .job-meta .badge { font-size: 10.5px; padding: 3px 10px; }
        .job-desc { font-size: 13px; color: var(--slate-500); margin: 0 0 16px; line-height: 1.6; }
        .job-foot { display: flex; justify-content: space-between; align-items: center; }
        .job-salary { font-weight: 700; color: var(--blue-800); font-size: 13.5px; }

        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .chip { padding: 7px 18px; border-radius: 100px; border: 1.5px solid var(--slate-200); background: #fff; font-size: 12.5px; font-weight: 600; color: var(--slate-700); transition: var(--transition); }
        .chip:hover { border-color: var(--blue-500); color: var(--blue-800); }
        .chip.active { background: var(--blue-800); border-color: var(--blue-800); color: #fff; }

        .fee-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
        .fee-card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); padding: 22px 20px; text-align: center; transition: var(--transition); }
        .fee-card:hover { border-color: var(--maroon-400); box-shadow: var(--shadow-md); transform: translateY(-3px); }
        .fee-card .fee-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--emerald-50); color: var(--emerald-600); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 20px; }
        .fee-card .fee-amount { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: var(--blue-900); }
        .fee-card .fee-label { font-size: 12px; color: var(--slate-500); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
        .fee-card .fee-desc { font-size: 12.5px; color: var(--slate-600); margin-top: 6px; }
        .fee-card.paid-by-employer { border-color: var(--emerald-600); background: var(--emerald-50); }
        .fee-card.paid-by-employer .fee-icon { background: var(--white); }

        .why-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .why-item { text-align: center; padding: 24px 16px; background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); transition: var(--transition); }
        .why-item:hover { border-color: var(--maroon-400); box-shadow: var(--shadow-md); transform: translateY(-3px); }
        .why-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--blue-800), var(--maroon-600)); color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 22px; }
        .why-item h4 { font-size: 15px; margin: 0 0 6px; color: var(--blue-900); }
        .why-item p { font-size: 13px; color: var(--slate-500); margin: 0; line-height: 1.5; }

        .process-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        .process-step { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); padding: 20px 18px; transition: var(--transition); text-align: center; }
        .process-step:hover { border-color: var(--maroon-400); box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .process-num { font-family: var(--font-head); font-size: 11px; font-weight: 800; color: var(--maroon-500); letter-spacing: .06em; margin-bottom: 8px; text-transform: uppercase; }
        .process-step h4 { font-size: 14px; margin: 0 0 6px; color: var(--blue-900); }
        .process-step p { font-size: 12px; color: var(--slate-500); margin: 0; line-height: 1.5; }

        .trust-banner { background: var(--emerald-50); border: 1px solid #bfe6cc; border-radius: var(--radius); padding: 20px 24px; display: flex; gap: 16px; align-items: flex-start; }
        .trust-banner i { color: var(--emerald-600); font-size: 22px; margin-top: 2px; flex-shrink: 0; }
        .trust-banner b { color: #0b6b3c; }
        .trust-banner p { margin: 2px 0 0; font-size: 13.5px; color: #0b6b3c; }

        .form-shell { display: grid; grid-template-columns: 1.5fr .9fr; gap: 28px; align-items: start; }
        .upload-box { border: 2px dashed var(--slate-300); border-radius: var(--radius); padding: 24px; text-align: center; background: var(--slate-50); cursor: pointer; transition: var(--transition); }
        .upload-box:hover { border-color: var(--blue-500); background: #EEF3F9; }
        .upload-box i { font-size: 24px; color: var(--blue-700); margin-bottom: 8px; }
        .upload-box .u-title { font-size: 13.5px; font-weight: 600; color: var(--blue-800); }
        .upload-box .u-sub { font-size: 11.5px; color: var(--slate-500); margin-top: 3px; }
        .upload-box.filled { border-style: solid; border-color: var(--emerald-600); background: var(--emerald-50); }
        .upload-box.filled i { color: var(--emerald-600); }

        .tip-card ul { list-style: none; padding: 0; margin: 0; }
        .tip-card li { display: flex; gap: 10px; font-size: 13px; color: var(--slate-700); margin-bottom: 10px; align-items: flex-start; }
        .tip-card li i { color: var(--maroon-500); margin-top: 3px; font-size: 12px; flex-shrink: 0; }

        .checkbox-row { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--slate-600); font-weight: 400 !important; }
        .checkbox-row input { margin-top: 3px; flex-shrink: 0; }

        .timeline { position: relative; padding-left: 4px; }
        .tl-item { position: relative; padding: 0 0 24px 34px; border-left: 2.5px solid var(--slate-200); }
        .tl-item:last-child { border-color: transparent; padding-bottom: 2px; }
        .tl-dot { position: absolute; left: -13px; top: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--slate-200); border: 3px solid #fff; box-shadow: 0 0 0 2px var(--slate-200); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; }
        .tl-item.done .tl-dot { background: var(--emerald-600); box-shadow: 0 0 0 2px var(--emerald-600); }
        .tl-item.current .tl-dot { background: var(--maroon-500); box-shadow: 0 0 0 4px rgba(168, 23, 47, .25); }
        .tl-item.rejected .tl-dot { background: var(--rose-600); box-shadow: 0 0 0 2px var(--rose-600); }
        .tl-title { font-weight: 700; font-size: 14px; color: var(--blue-900); }
        .tl-date { font-size: 11.5px; color: var(--slate-500); margin-top: 2px; }
        .tl-note { font-size: 13px; color: var(--slate-600); margin-top: 6px; background: var(--slate-100); padding: 8px 12px; border-radius: 7px; }

        .dash-shell { display: grid; grid-template-columns: 230px 1fr; gap: 0; min-height: calc(100vh - 72px); }
        .dash-side { background: var(--blue-950); color: #fff; padding: 24px 16px; }
        .dash-side .side-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: #7C93B3; padding: 8px 12px 12px; font-weight: 700; }
        .side-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 600; color: #C9D6E8; margin-bottom: 2px; transition: var(--transition); }
        .side-link i { width: 18px; text-align: center; font-size: 15px; }
        .side-link:hover { background: rgba(255, 255, 255, .06); color: #fff; }
        .side-link.active { background: var(--maroon-600); color: #fff; }

        .dash-main { padding: 28px 32px; background: var(--bg); }
        .dash-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 14px; }
        .dash-topbar h2 { margin: 0; font-size: 22px; color: var(--blue-900); }

        .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); padding: 16px 18px; transition: var(--transition); }
        .stat-card:hover { border-color: var(--blue-500); box-shadow: var(--shadow-sm); }
        .stat-card .n { font-family: var(--font-head); font-size: 26px; font-weight: 800; color: var(--blue-900); line-height: 1.2; }
        .stat-card .l { font-size: 11.5px; color: var(--slate-500); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

        .search-input { position: relative; flex: 1; min-width: 220px; max-width: 340px; }
        .search-input i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--slate-400); }
        .search-input input { padding-left: 38px; border-radius: 8px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(10, 31, 68, .55); backdrop-filter: blur(4px); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 1000; overflow: auto; }
        .modal { background: #fff; border-radius: var(--radius-lg); max-width: 780px; width: 100%; box-shadow: var(--shadow-xl); margin: auto; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 26px; border-bottom: 1px solid var(--slate-200); }
        .modal-head h3 { margin: 0; font-size: 17px; color: var(--blue-900); }
        .modal-close { background: var(--slate-100); border: none; width: 34px; height: 34px; border-radius: 8px; color: var(--slate-600); font-size: 16px; transition: var(--transition); }
        .modal-close:hover { background: var(--slate-200); }
        .modal-body { padding: 24px 26px; max-height: 70vh; overflow: auto; }
        .modal-foot { padding: 16px 26px; border-top: 1px solid var(--slate-200); display: flex; justify-content: flex-end; gap: 10px; }

        .doc-row { display: flex; align-items: center; justify-content: space-between; background: var(--slate-50); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .doc-row .di { display: flex; align-items: center; gap: 10px; font-size: 13.5px; font-weight: 600; color: var(--blue-800); }
        .doc-row .di i { color: var(--blue-700); }

        .toast-wrap { position: fixed; top: 84px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; max-width: 380px; }
        .toast { background: var(--blue-900); color: #fff; padding: 14px 20px; border-radius: 10px; font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px; animation: slideIn .25s ease; }
        .toast i { color: #F3B9C2; font-size: 18px; }
        .toast.err { background: var(--rose-600); }
        .toast.err i { color: #fff; }
        .toast.ok { background: var(--emerald-600); }
        .toast.ok i { color: #fff; }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .auth-shell { max-width: 440px; margin: 56px auto; padding: 0 20px; }
        .auth-shell .card { padding: 34px 32px; }
        .auth-icon { width: 54px; height: 54px; border-radius: 14px; background: linear-gradient(135deg, var(--blue-800), var(--maroon-600)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
        .tab-row { display: flex; gap: 6px; background: var(--slate-100); padding: 4px; border-radius: 10px; margin-bottom: 22px; }
        .tab-btn { flex: 1; text-align: center; padding: 9px 12px; border-radius: 7px; font-size: 13px; font-weight: 700; color: var(--slate-500); background: transparent; border: none; transition: var(--transition); }
        .tab-btn.active { background: #fff; color: var(--blue-900); box-shadow: var(--shadow-sm); }
        .tab-btn:hover:not(.active) { color: var(--slate-700); }

        footer { background: var(--blue-950); color: #B9C8DC; padding: 56px 24px 28px; border-top: 1px solid rgba(255, 255, 255, .05); }
        .foot-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 32px; margin-bottom: 36px; }
        .foot-brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-weight: 800; font-size: 19px; color: #fff; margin-bottom: 12px; }
        footer h5 { color: #fff; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 14px; font-weight: 700; }
        footer a { display: block; font-size: 13px; color: #B9C8DC; margin-bottom: 10px; transition: var(--transition); }
        footer a:hover { color: #F3B9C2; }
        .foot-bottom { border-top: 1px solid rgba(255, 255, 255, .06); padding-top: 20px; font-size: 12px; color: #7C93B3; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }

        .legal-body h3 { color: var(--blue-900); font-size: 17px; margin-top: 28px; }
        .legal-body p, .legal-body li { color: var(--slate-700); font-size: 14px; line-height: 1.8; }
        .legal-body { max-width: 800px; margin: 0 auto; }
        .legal-body ul { padding-left: 20px; }

        .empty-state { text-align: center; padding: 48px 20px; color: var(--slate-500); }
        .empty-state i { font-size: 32px; color: var(--slate-300); margin-bottom: 12px; }

        @media (max-width: 1024px) {
            .country-grid, .job-grid, .why-grid, .fee-grid { grid-template-columns: repeat(2, 1fr); }
            .process-grid { grid-template-columns: repeat(3, 1fr); }
            .stat-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 820px) {
            .hero-inner { grid-template-columns: 1fr; padding: 48px 20px 40px; gap: 32px; }
            .hero h1 { font-size: 32px; }
            .form-shell { grid-template-columns: 1fr; }
            .dash-shell { grid-template-columns: 1fr; }
            .dash-side { display: flex; overflow: auto; gap: 4px; padding: 12px 16px; }
            .dash-side .side-title { display: none; }
            .side-link { padding: 8px 14px; font-size: 12.5px; white-space: nowrap; }
            .foot-grid { grid-template-columns: 1fr 1fr; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .country-grid, .job-grid, .why-grid, .fee-grid, .process-grid, .stat-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 26px; }
            .field-row { grid-template-columns: 1fr; }
            .foot-grid { grid-template-columns: 1fr; }
            .dash-main { padding: 20px 16px; }
            .modal { margin: 10px; }
            .modal-body { padding: 16px; }
            .modal-head { padding: 16px; }
            .modal-foot { padding: 14px 16px; flex-wrap: wrap; }
            .search-input { max-width: 100%; }
        }

        .text-center { text-align: center; }
        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .gap-8 { gap: 8px; }
        .flex-wrap { flex-wrap: wrap; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="navbar"></div>
    <div id="app"></div>
    <div id="modal-root"></div>
    <div class="toast-wrap" id="toast-wrap"></div>

    <script type="module">
        // =============================================================
        // IMPORTS
        // =============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
        import {
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut,
            onAuthStateChanged, sendPasswordResetEmail, updateProfile,
            GoogleAuthProvider, signInWithPopup
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import {
            getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc,
            query, where, orderBy, onSnapshot, Timestamp, serverTimestamp, arrayUnion, arrayRemove
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // =============================================================
        // FIREBASE CONFIG (public client identifiers — safe to expose;
        // access is controlled by Firestore/Storage security rules,
        // NOT by keeping this object secret)
        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCAKCZJTAq_NeLmo5toNjYVHFqZFSQxNzE",
            authDomain: "tuchel-98f49.firebaseapp.com",
            projectId: "tuchel-98f49",
            storageBucket: "tuchel-98f49.firebasestorage.app",
            messagingSenderId: "150337843790",
            appId: "1:150337843790:web:ae748271b1ffae423f491f",
            measurementId: "G-NZMF0WDKVK"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const UPLOADCARE_PUBLIC_KEY = "a86c7a60e542a9af46c4";

        // =============================================================
        // GLOBALS
        // =============================================================
        let currentUser = null;
        let currentUserData = null;
        let allJobs = [];
        let allApps = [];
        let allFees = [];
        let unsubscribeApps = null;
        let unsubscribeJobs = null;
        let unsubscribeFees = null;

        // =============================================================
        // CONSTANTS
        // =============================================================
        const COUNTRIES = [
            "Germany", "United Kingdom", "Netherlands", "Sweden",
            "Ireland", "Luxembourg", "France", "Poland"
        ];
        const COUNTRY_META = {
            "Germany": { flag: "de", dial: "+49", currency: "EUR" },
            "United Kingdom": { flag: "gb", dial: "+44", currency: "GBP" },
            "Netherlands": { flag: "nl", dial: "+31", currency: "EUR" },
            "Sweden": { flag: "se", dial: "+46", currency: "SEK" },
            "Ireland": { flag: "ie", dial: "+353", currency: "EUR" },
            "Luxembourg": { flag: "lu", dial: "+352", currency: "EUR" },
            "France": { flag: "fr", dial: "+33", currency: "EUR" },
            "Poland": { flag: "pl", dial: "+48", currency: "PLN" }
        };
        const CATEGORIES = [
            "Construction & Manual Labor", "Hospitality & Domestic Services", "Healthcare",
            "Skilled Trades", "Logistics & Drivers", "Engineering & Technical",
            "IT & Professional Services", "Agriculture & Farm Work",
            "Education & Teaching", "Finance & Accounting"
        ];
        const CATEGORY_ICON = {
            "Construction & Manual Labor": "fa-solid fa-helmet-safety",
            "Hospitality & Domestic Services": "fa-solid fa-concierge-bell",
            "Healthcare": "fa-solid fa-notes-medical",
            "Skilled Trades": "fa-solid fa-screwdriver-wrench",
            "Logistics & Drivers": "fa-solid fa-truck-fast",
            "Engineering & Technical": "fa-solid fa-drafting-compass",
            "IT & Professional Services": "fa-solid fa-laptop-code",
            "Agriculture & Farm Work": "fa-solid fa-wheat-awn",
            "Education & Teaching": "fa-solid fa-chalkboard-user",
            "Finance & Accounting": "fa-solid fa-calculator"
        };
        const STATUS_STEPS = [
            "Application Received", "Document Verification", "Screening Interview",
            "Employer Matching", "Job Offer Extended", "Contract Signing",
            "Visa Sponsorship Processing", "Medical & Police Clearance",
            "Travel & Deployment", "Placed — Active Employment"
        ];
        const TERMINAL_ALT = ["On Hold", "Rejected", "Withdrawn by Applicant"];
        const ALL_STATUSES = [...STATUS_STEPS, ...TERMINAL_ALT];
        const FLAG_BASE = "https://flagcdn.com/";

        // =============================================================
        // HELPERS
        // =============================================================
        function flagUrl(code) { return `${FLAG_BASE}${code}.svg`; }
        function esc(s) { if (!s) return ""; return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
        function fmtDate(ts) {
            if (!ts) return "—";
            if (ts.toDate) ts = ts.toDate();
            const d = new Date(ts);
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) + " · " + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        }
        function genAppId() {
            const yr = new Date().getFullYear();
            const rand = Math.floor(100000 + Math.random() * 899999);
            return `ESJ-${yr}-${rand}`;
        }
        function toast(msg, type) {
            const wrap = document.getElementById('toast-wrap');
            const el = document.createElement('div');
            el.className = 'toast' + (type ? ' ' + type : '');
            const icon = type === 'err' ? 'fa-circle-exclamation' : type === 'ok' ? 'fa-circle-check' : 'fa-bell';
            el.innerHTML = `<i class="fa-solid ${icon}"></i><span>${esc(msg)}</span>`;
            wrap.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = '.3s'; setTimeout(() => el.remove(), 300); }, 3600);
        }
        function statusTone(status) {
            if (status === "Placed — Active Employment") return "green";
            if (status === "Rejected") return "rose";
            if (status === "On Hold" || status === "Withdrawn by Applicant") return "amber";
            return "maroon";
        }
        function statusBadge(status) {
            const tone = statusTone(status);
            const cls = tone === 'green' ? 'badge-green' : tone === 'rose' ? 'badge-rose' : tone === 'amber' ? 'badge-amber' : 'badge-maroon';
            const icon = tone === 'green' ? 'fa-circle-check' : tone === 'rose' ? 'fa-circle-xmark' : tone === 'amber' ? 'fa-triangle-exclamation' : 'fa-circle';
            return `<span class="badge ${cls}"><i class="fa-solid ${icon}" style="font-size:7px"></i> ${esc(status)}</span>`;
        }
        function simulateEmail(to, subject, body) {
            console.log(`📧 [SIMULATED] To: ${to}\nSubject: ${subject}\nBody: ${body}`);
            toast(`📧 Email notification sent to ${to}`, 'ok');
        }

        // =============================================================
        // FIRESTORE DATA ACCESS
        // =============================================================
        async function loadJobs() {
            const snapshot = await getDocs(collection(db, "jobs"));
            allJobs = [];
            snapshot.forEach(d => allJobs.push({ id: d.id, ...d.data() }));
            return allJobs;
        }
        async function addJob(jobData) {
            const ref = doc(collection(db, "jobs"));
            await setDoc(ref, { ...jobData, createdAt: serverTimestamp() });
            await loadJobs();
            return ref.id;
        }
        async function deleteJob(jobId) { await deleteDoc(doc(db, "jobs", jobId)); await loadJobs(); }

        async function loadApps() {
            const snapshot = await getDocs(collection(db, "applications"));
            allApps = [];
            snapshot.forEach(d => allApps.push({ id: d.id, ...d.data() }));
            return allApps;
        }
        async function getApp(appId) {
            const docSnap = await getDoc(doc(db, "applications", appId));
            if (docSnap.exists()) return { id: docSnap.id, ...docSnap.data() };
            return null;
        }
        async function createApp(appData) {
            const appId = genAppId();
            const ref = doc(db, "applications", appId);
            const newApp = {
                ...appData, id: appId,
                timeline: [{ status: "Application Received", date: new Date().toISOString(), note: "Application submitted." }],
                internalNotes: [], archived: false,
                createdAt: serverTimestamp(), updatedAt: serverTimestamp(),
                status: "Application Received",
                documentsVerified: { cv: false, passport: false }
            };
            await setDoc(ref, newApp);
            await loadApps();
            return newApp;
        }
        async function updateApp(appId, patch) {
            const ref = doc(db, "applications", appId);
            await updateDoc(ref, { ...patch, updatedAt: serverTimestamp() });
            await loadApps();
            return await getApp(appId);
        }

        async function loadFees() {
            const snapshot = await getDocs(collection(db, "fees"));
            allFees = [];
            snapshot.forEach(d => allFees.push({ id: d.id, ...d.data() }));
            return allFees;
        }
        async function addFee(feeData) {
            const ref = doc(collection(db, "fees"));
            await setDoc(ref, { ...feeData, createdAt: serverTimestamp() });
            await loadFees();
            return ref.id;
        }
        async function deleteFee(feeId) { await deleteDoc(doc(db, "fees", feeId)); await loadFees(); }

        // --- Admins are looked up by Firestore doc, NEVER by a
        // hardcoded credential check in client code. See the
        // ADMIN BOOTSTRAP note at the bottom of this file for how
        // to create the real admin account. ---
        async function getAdminUser(uid) {
            const docSnap = await getDoc(doc(db, "admins", uid));
            if (docSnap.exists()) return { id: docSnap.id, ...docSnap.data() };
            return null;
        }

        // =============================================================
        // AUTH STATE
        // =============================================================
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const adminData = await getAdminUser(user.uid);
                if (adminData) {
                    currentUserData = { ...adminData, type: 'admin' };
                    await loadJobs(); await loadApps(); await loadFees();
                    subscribeToRealtime();
                } else {
                    const appData = await getApp(user.uid);
                    if (appData) {
                        currentUserData = { ...appData, type: 'applicant' };
                        await loadJobs(); await loadFees();
                        subscribeToRealtime();
                    } else if (ROUTE.view === 'complete-profile') {
                        // mid-signup via Google — let the profile-completion view handle it
                    } else {
                        currentUserData = { type: 'needs-profile' };
                        navigate("complete-profile");
                        return;
                    }
                }
            } else {
                currentUserData = null;
                if (unsubscribeApps) { unsubscribeApps(); unsubscribeApps = null; }
                if (unsubscribeJobs) { unsubscribeJobs(); unsubscribeJobs = null; }
                if (unsubscribeFees) { unsubscribeFees(); unsubscribeFees = null; }
            }
            renderNavbar();
            renderCurrentView();
        });

        function subscribeToRealtime() {
            if (unsubscribeApps) unsubscribeApps();
            unsubscribeApps = onSnapshot(collection(db, "applications"), (snapshot) => {
                allApps = [];
                snapshot.forEach(d => allApps.push({ id: d.id, ...d.data() }));
                if (ROUTE.view === "admin-dashboard" || ROUTE.view === "applicant-dashboard") renderCurrentView();
            });
            if (unsubscribeJobs) unsubscribeJobs();
            unsubscribeJobs = onSnapshot(collection(db, "jobs"), (snapshot) => {
                allJobs = [];
                snapshot.forEach(d => allJobs.push({ id: d.id, ...d.data() }));
                if (ROUTE.view === "jobs" || ROUTE.view === "admin-jobs" || ROUTE.view === "home") renderCurrentView();
            });
            if (unsubscribeFees) unsubscribeFees();
            unsubscribeFees = onSnapshot(collection(db, "fees"), (snapshot) => {
                allFees = [];
                snapshot.forEach(d => allFees.push({ id: d.id, ...d.data() }));
                if (ROUTE.view === "fees" || ROUTE.view === "admin-fees") renderCurrentView();
            });
        }

        // =============================================================
        // ROUTER
        // =============================================================
        let ROUTE = { view: "home", params: {} };
        function navigate(view, params = {}) {
            ROUTE = { view, params };
            window.scrollTo({ top: 0, behavior: "instant" });
            renderCurrentView();
        }

        // =============================================================
        // NAVBAR
        // =============================================================
        function renderNavbar() {
            const nav = document.getElementById('navbar');
            const links = [
                { v: "home", label: "Home" },
                { v: "jobs", label: "Browse Jobs" },
                { v: "status", label: "Check Status" },
                { v: "fees", label: "Fees" },
                { v: "faq", label: "FAQ" }
            ];
            let rightHtml = "";
            if (currentUser && currentUserData) {
                if (currentUserData.type === 'applicant') {
                    rightHtml = `<a class="nav-link" data-nav="applicant-dashboard"><i class="fa-solid fa-user"></i> My Portal</a>
                <button class="btn btn-outline btn-sm" data-action="logout">Log out</button>`;
                } else if (currentUserData.type === 'admin') {
                    rightHtml = `<a class="nav-link" data-nav="admin-dashboard"><i class="fa-solid fa-shield-halved"></i> Admin</a>
                <button class="btn btn-outline btn-sm" data-action="logout">Log out</button>`;
                }
            } else {
                rightHtml = `<a class="btn btn-outline btn-sm" data-nav="login">Log In</a>
              <a class="btn btn-maroon btn-sm" data-nav="apply"><i class="fa-solid fa-paper-plane"></i> Apply Now</a>`;
            }
            const html = `
            <div class="wrap nav-inner">
              <a class="brand" data-nav="home">
                <span class="brand-mark"><i class="fa-solid fa-earth-europe"></i></span>
                Europe Sponsor Jobs
              </a>
              <div class="nav-links" id="navLinks">
                ${links.map(l => `<a class="nav-link ${ROUTE.view === l.v ? 'active' : ''}" data-nav="${l.v}">${l.label}</a>`).join("")}
                <div class="nav-cta" style="margin-top:6px">${rightHtml}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="nav-cta" style="display:flex">${rightHtml}</div>
                <button class="nav-mobile-toggle" id="mobileToggle"><i class="fa-solid fa-bars"></i></button>
              </div>
            </div>`;
            nav.innerHTML = html;
            nav.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => navigate(el.getAttribute('data-nav'))));
            nav.querySelectorAll('[data-action="logout"]').forEach(el => el.addEventListener('click', async () => {
                await signOut(auth); currentUserData = null; toast("You have been logged out.", "ok"); navigate("home");
            }));
            const mt = document.getElementById('mobileToggle');
            if (mt) mt.addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
            const cta = document.querySelectorAll('.nav-cta')[1];
            if (window.innerWidth <= 900 && cta) cta.style.display = 'none';
        }

        // =============================================================
        // RENDER ENGINE
        // =============================================================
        function renderCurrentView() {
            const appEl = document.getElementById('app');
            let html = "";
            switch (ROUTE.view) {
                case "home": html = viewHome(); break;
                case "jobs": html = viewJobs(); break;
                case "apply": html = viewApply(); break;
                case "confirmation": html = viewConfirmation(); break;
                case "status": html = viewStatus(); break;
                case "fees": html = viewFees(); break;
                case "login": html = viewLogin(); break;
                case "complete-profile": html = viewCompleteProfile(); break;
                case "applicant-dashboard": html = viewApplicantDashboard(); break;
                case "admin-dashboard": html = viewAdminDashboard(); break;
                case "admin-jobs": html = viewAdminJobs(); break;
                case "admin-fees": html = viewAdminFees(); break;

        function wireApplyForm() {
            const cvBox = document.getElementById('cvBox');
            const passBox = document.getElementById('passBox');
            if (!cvBox) return;

            cvBox.addEventListener('click', () => {
                const dialog = uploadcare.openDialog(null, {
                    publicKey: UPLOADCARE_PUBLIC_KEY, multiple: false, imgOnly: false,
                    accept: 'application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document'
                });
                dialog.done((result) => {
                    result.files[0].promise().then((info) => {
                        document.getElementById('cvUploaded').value = info.cdnUrl;
                        cvBox.classList.add('filled');
                        document.getElementById('cvSub').textContent = info.name || 'CV uploaded';
                        toast('CV uploaded successfully!', 'ok');
                    });
                });
                dialog.fail(() => toast('Upload cancelled or failed.', 'err'));
            });

            passBox.addEventListener('click', () => {
                const dialog = uploadcare.openDialog(null, {
                    publicKey: UPLOADCARE_PUBLIC_KEY, multiple: false, imgOnly: false,
                    accept: 'image/jpeg,image/png,application/pdf'
                });
                dialog.done((result) => {
                    result.files[0].promise().then((info) => {
                        document.getElementById('passUploaded').value = info.cdnUrl;
                        passBox.classList.add('filled');
                        document.getElementById('passSub').textContent = info.name || 'Passport uploaded';
                        toast('Passport uploaded successfully!', 'ok');
                    });
                });
                dialog.fail(() => toast('Upload cancelled or failed.', 'err'));
            });

            document.getElementById('applyForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const fullName = fd.get('fullName').trim();
                const email = fd.get('email').trim();
                const phone = fd.get('phone').trim();
                const residence = fd.get('residence');
                const city = fd.get('city').trim();
                const jobId = fd.get('jobId');
                const cover = fd.get('cover').trim();
                const password = fd.get('password');
                const terms = fd.get('terms');
                const cvUrl = fd.get('cvUrl');
                const passportUrl = fd.get('passportUrl');

                if (!fullName || !email || !phone || !residence || !city || !jobId) { toast("Please complete all required fields.", "err"); return; }
                if (!/^\S+@\S+\.\S+$/.test(email)) { toast("Please enter a valid email address.", "err"); return; }
                if (!cvUrl) { toast("Please upload your CV/Resume.", "err"); return; }
                if (!password || password.length < 6) { toast("Password must be at least 6 characters.", "err"); return; }
                if (!terms) { toast("Please accept the Terms & Conditions to continue.", "err"); return; }

                try {
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCred.user;
                    await updateProfile(user, { displayName: fullName });
                    const job = allJobs.find(j => j.id === jobId);
                    const appData = {
                        uid: user.uid, fullName, email, phone, country: job.country, city, jobId,
                        jobTitle: job.title, coverLetter: cover, cvUrl, passportUrl: passportUrl || '',
                        status: "Application Received",
                        documentsVerified: { cv: true, passport: !!passportUrl },
                        timeline: [{ status: "Application Received", date: new Date().toISOString(), note: "Application submitted via the Europe Sponsor Jobs website." }],
                        internalNotes: [], archived: false
                    };
                    await createApp(appData);
                    simulateEmail(email, "Application Received – Europe Sponsor Jobs",
                        `Dear ${fullName},\n\nThank you for applying with Europe Sponsor Jobs. Your Application ID is ${user.uid}.\n\nYou can check your status anytime by logging into your portal.\n\nBest regards,\nEurope Sponsor Jobs Team`);
                    currentUserData = { ...appData, type: 'applicant' };
                    toast(`Application submitted! Your ID: ${user.uid}`, 'ok');
                    navigate("confirmation", { appId: user.uid });
                } catch (error) {
                    console.error("Application error:", error);
                    toast(error.message || "Failed to submit application. Please try again.", "err");
                }
            });
        }

        function renderTimeline(app) {
            const timeline = app.timeline || [];
            const isTerminalAlt = TERMINAL_ALT.includes(app.status);
            const items = timeline.slice().sort((a, b) => new Date(a.date) - new Date(b.date));
            return `<div class="timeline">
            ${items.map((t,i) => {
              const isLast = i === items.length - 1;
              const cls = TERMINAL_ALT.includes(t.status) && t.status === 'Rejected' ? 'rejected' : (isLast ? (isTerminalAlt ? '' : 'current') : 'done');
              const iconDone = cls === 'done' ? '<i class="fa-solid fa-check"></i>' : cls === 'rejected' ? '<i class="fa-solid fa-xmark"></i>' : '';
              return `<div class="tl-item ${cls}">
                <div class="tl-dot">${iconDone}</div>
                <div class="tl-title">${esc(t.status)}</div>
                <div class="tl-date">${fmtDate(t.date)}</div>
                ${t.note ? `<div class="tl-note">${esc(t.note)}</div>` : ''}
              </div>`;
            }).join("")}
            ${!isTerminalAlt && items.length < STATUS_STEPS.length ? `
              <div class="tl-item">
                <div class="tl-dot"></div>
                <div class="tl-title" style="color:var(--slate-400)">${esc(STATUS_STEPS[items.length] || "")}</div>
                <div class="tl-date">Upcoming</div>
              </div>` : ""}
          </div>`;
        }

    <!-- =====================================================================
    ADMIN BOOTSTRAP — READ THIS BEFORE GOING LIVE
    =====================================================================

    Admin access in this app is gated by a Firestore document at
    admins/{uid} — the code checks for that document, NOT a hardcoded
    password. That's the only way "admin login" can actually mean
    something: a hardcoded string in client-side JS is visible to
    anyone who opens dev tools, so it can never function as real
    security.

    To create the real admin account (do this once, outside of any
    chat/prompt, then delete this block):

    1. Firebase Console → Authentication → Users → Add user.
       Email:    admin@europesponsorjobs.com  (use your real domain)
       Password: set a strong password privately — do not reuse
                 anything that has ever appeared in a chat or repo.

    2. Copy the generated User UID.

    3. Firebase Console → Firestore Database → Start collection
       "admins" → Document ID = that UID → add fields:
         name: "Admin"
         role: "superadmin"
         createdAt: (timestamp, now)

    4. Log in on the Admin tab of this site with that email/password.
       onAuthStateChanged will find the admins/{uid} doc and unlock
       the dashboard.

    Alternatively, run this once from a trusted machine (not this
    file, not committed to git):

      import { initializeApp } from "firebase/app";
      import { getAuth, createUserWithEmailAndPassword } from "firebase/auth";
      import { getFirestore, doc, setDoc } from "firebase/firestore";
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const cred = await createUserWithEmailAndPassword(auth, "admin@europesponsorjobs.com", "<your-strong-password>");
      await setDoc(doc(db, "admins", cred.user.uid), { name: "Admin", role: "superadmin", createdAt: new Date() });

    Also lock down Firestore Security Rules so only signed-in admins
    can write to "jobs", "fees", and other applicants' "applications"
    docs — right now this file assumes rules do that server-side;
    client code alone cannot enforce permissions.
    ===================================================================== -->
