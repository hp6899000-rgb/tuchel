<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --blue-950: #06132b; --blue-900: #0A1F44; --blue-800: #0E2C5C; --blue-700: #133C79; --blue-600: #1B4F99; --blue-500: #2E68B8;
            --maroon-700: #6E0F1F; --maroon-600: #8A1226; --maroon-500: #A8172F; --maroon-400: #C42D45; --maroon-50: #FBEAEC;
            --emerald-600: #0F9D58; --emerald-500: #1ab46a; --emerald-50: #E8F7EE;
            --rose-600: #e11d48; --rose-50: #fce7eb;
            --amber-600: #D97706; --amber-50: #FEF3E2;
            --slate-900: #0F172A; --slate-800: #1E293B; --slate-700: #334155; --slate-600: #475569; --slate-500: #64748B; --slate-400: #94A3B8; --slate-300: #CBD5E1; --slate-200: #E2E8F0; --slate-100: #F1F5F9; --slate-50: #F8FAFC;
            --bg: #F6F8FB; --white: #FFFFFF;
            --radius: 12px; --radius-lg: 18px;
            --shadow-sm: 0 1px 3px rgba(10,31,68,.06),0 1px 2px rgba(10,31,68,.04);
            --shadow-md: 0 6px 20px rgba(10,31,68,.08);
            --shadow-lg: 0 20px 50px rgba(10,31,68,.14);
            --shadow-xl: 0 30px 70px rgba(10,31,68,.20);
            --font-head: 'Sora',sans-serif; --font-body: 'Inter',sans-serif;
            --transition: .25s cubic-bezier(.4,0,.2,1);
            --msg-sent: #DCF8C6; --msg-rec: #fff;
        }
        * { box-sizing: border-box; margin: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--slate-900); -webkit-font-smoothing: antialiased; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        h1,h2,h3,h4 { font-family: var(--font-head); letter-spacing: -0.01em; }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input,select,textarea { font-family: inherit; font-size: 14px; padding: 10px 14px; border: 1.5px solid var(--slate-200); border-radius: 8px; width: 100%; background: #fff; color: var(--slate-900); outline: none; transition: var(--transition); }
        input:focus,select:focus,textarea:focus { border-color: var(--blue-600); box-shadow: 0 0 0 3px rgba(46,104,184,.12); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 22px; border-radius: 8px; font-size: 13.5px; font-weight: 700; border: 1.5px solid transparent; transition: var(--transition); white-space: nowrap; }
        .btn-primary { background: var(--blue-800); color: #fff; border-color: var(--blue-800); }
        .btn-primary:hover { background: var(--blue-700); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-maroon { background: var(--maroon-600); color: #fff; border-color: var(--maroon-600); }
        .btn-maroon:hover { background: var(--maroon-500); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-outline { background: transparent; border-color: var(--slate-300); color: var(--slate-700); }
        .btn-outline:hover { border-color: var(--blue-600); background: var(--slate-50); color: var(--blue-800); }
        .btn-sm { padding: 8px 16px; font-size: 12.5px; }
        .btn-block { width: 100%; }
        .card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
        .card.pad { padding: 22px 26px; }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; width: 100%; }
        .field { margin-bottom: 18px; }

        .hint { font-size: 12px; color: var(--slate-500); margin-top: 5px; }
        .divider-or { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--slate-400); font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .divider-or::before,.divider-or::after { content: ""; flex: 1; height: 1px; background: var(--slate-200); }
        .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 100px; white-space: nowrap; text-transform: uppercase; letter-spacing: .02em; }
        .badge-blue { background: var(--blue-800); color: #fff; }
        .badge-maroon { background: var(--maroon-600); color: #fff; }
        .badge-green { background: var(--emerald-50); color: var(--emerald-600); }
        .badge-amber { background: var(--amber-50); color: var(--amber-600); }
        .badge-rose { background: var(--rose-50); color: var(--rose-600); }
        .badge-slate { background: var(--slate-100); color: var(--slate-700); }
        .chip { padding: 7px 18px; border-radius: 100px; border: 1.5px solid var(--slate-200); background: #fff; font-size: 12.5px; font-weight: 600; color: var(--slate-700); transition: var(--transition); }
        .chip:hover { border-color: var(--blue-500); color: var(--blue-800); }
        .chip.active { background: var(--blue-800); border-color: var(--blue-800); color: #fff; }
        .grid { display: grid; gap: 20px; }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--slate-400); }
        .empty-state i { font-size: 48px; margin-bottom: 14px; color: var(--slate-300); }
        .empty-state p { font-size: 14px; margin-bottom: 12px; }
        .msg-count { background: var(--maroon-500); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: 700; margin-left: 4px; }
        .toast-wrap { position: fixed; top: 84px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: var(--slate-900); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); animation: slideIn .3s ease; pointer-events: auto; max-width: 400px; }
        .toast.ok { background: #065F46; }
        .toast.err { background: #991B1B; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        th { text-align: left; padding: 12px 14px; background: var(--slate-50); color: var(--slate-600); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid var(--slate-200); white-space: nowrap; }
        td { padding: 12px 14px; border-bottom: 1px solid var(--slate-100); vertical-align: middle; }
        tr:hover td { background: var(--slate-50); }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .search-input { display: flex; align-items: center; background: #fff; border: 1.5px solid var(--slate-200); border-radius: 8px; padding: 0 12px; }
        .search-input i { color: var(--slate-400); font-size: 14px; }
        .search-input input { border: none; padding: 9px 8px; min-width: 200px; }
        .search-input input:focus { box-shadow: none; }

        .dash-shell { display: grid; grid-template-columns: 230px 1fr; gap: 0; min-height: calc(100vh - 72px); }
        .dash-side { background: var(--blue-950); color: #fff; padding: 24px 16px; }
        .dash-side .side-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: #7C93B3; padding: 8px 12px 12px; font-weight: 700; }
        .side-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: #B9C8DC; transition: var(--transition); cursor: pointer; }
        .side-link:hover { background: rgba(255,255,255,.08); color: #fff; }
        .side-link.active { background: rgba(255,255,255,.12); color: #fff; font-weight: 700; }
        .dash-main { padding: 28px 32px; background: var(--bg); }
        .dash-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 14px; }
        .dash-topbar h2 { margin: 0; font-size: 22px; color: var(--blue-900); }
        .stat-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); padding: 16px 18px; transition: var(--transition); }
        .stat-card:hover { border-color: var(--blue-500); box-shadow: var(--shadow-sm); }
        .stat-card .n { font-family: var(--font-head); font-size: 26px; font-weight: 800; color: var(--blue-900); line-height: 1.2; }
        .stat-card .l { font-size: 11.5px; color: var(--slate-500); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(10,31,68,.55); backdrop-filter: blur(4px); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 1000; overflow: auto; }
        .modal { background: #fff; border-radius: var(--radius-lg); max-width: 780px; width: 100%; box-shadow: var(--shadow-xl); margin: auto; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 26px; border-bottom: 1px solid var(--slate-200); }

        .modal-close { background: var(--slate-100); border: none; width: 34px; height: 34px; border-radius: 8px; color: var(--slate-600); font-size: 16px; transition: var(--transition); cursor: pointer; }
        .modal-close:hover { background: var(--slate-200); }
        .modal-body { padding: 24px 26px; max-height: 70vh; overflow: auto; }
        .modal-foot { padding: 16px 26px; border-top: 1px solid var(--slate-200); display: flex; justify-content: flex-end; gap: 10px; }

        .msg-shell { display: grid; grid-template-columns: 320px 1fr; gap: 0; min-height: calc(100vh - 72px); }
        .msg-list-panel { background: #fff; border-right: 1px solid var(--slate-200); overflow: auto; }
        .msg-list-header { padding: 18px 16px; border-bottom: 1px solid var(--slate-200); font-weight: 700; color: var(--blue-900); font-family: var(--font-head); }
        .msg-list-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--slate-100); cursor: pointer; transition: var(--transition); }
        .msg-list-item:hover { background: var(--slate-50); }
        .msg-list-item.active { background: var(--slate-100); border-left: 3px solid var(--maroon-500); }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg,var(--blue-800),var(--maroon-600)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
        .msg-list-content { flex: 1; min-width: 0; }
        .msg-list-name { font-weight: 600; font-size: 13.5px; color: var(--slate-900); }
        .msg-list-preview { font-size: 12px; color: var(--slate-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-list-time { font-size: 11px; color: var(--slate-400); white-space: nowrap; }
        .msg-list-meta { display: flex; align-items: center; gap: 8px; }
        .msg-unread { background: var(--maroon-500); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: 700; min-width: 18px; text-align: center; }
        .msg-chat-panel { display: flex; flex-direction: column; background: var(--bg); }
        .msg-chat-header { padding: 14px 20px; border-bottom: 1px solid var(--slate-200); background: #fff; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .msg-chat-header .msg-avatar { cursor: pointer; }
        .msg-chat-body { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 75%; padding: 10px 16px; border-radius: 16px; font-size: 13.5px; line-height: 1.5; word-wrap: break-word; }
        .msg-bubble.sent { align-self: flex-end; background: var(--msg-sent); border-bottom-right-radius: 4px; }
        .msg-bubble.rec { align-self: flex-start; background: var(--msg-rec); border: 1px solid var(--slate-200); border-bottom-left-radius: 4px; }
        .msg-bubble .msg-time { font-size: 10px; color: var(--slate-400); margin-top: 4px; text-align: right; }
        .msg-chat-input { padding: 12px 20px; border-top: 1px solid var(--slate-200); background: #fff; display: flex; gap: 10px; align-items: flex-end; }
        .msg-chat-input textarea { flex: 1; resize: none; min-height: 20px; max-height: 120px; padding: 10px 14px; border-radius: 20px; }
        .msg-chat-input .btn { border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg-empty { display: flex; flex: 1; align-items: center; justify-content: center; color: var(--slate-400); text-align: center; padding: 40px; }
        .msg-empty i { font-size: 48px; margin-bottom: 16px; color: var(--slate-300); }

        .tl-item { position: relative; padding-left: 28px; padding-bottom: 20px; }
        .tl-item:last-child { padding-bottom: 0; }
        .tl-dot { position: absolute; left: 0; top: 4px; width: 18px; height: 18px; border-radius: 50%; background: var(--slate-200); display: flex; align-items: center; justify-content: center; font-size: 8px; color: #fff; }
        .tl-item.done .tl-dot { background: var(--emerald-500); }
        .tl-item.current .tl-dot { background: var(--blue-600); width: 20px; height: 20px; left: -1px; box-shadow: 0 0 0 4px rgba(46,104,184,.15); }
        .tl-item.rejected .tl-dot { background: var(--rose-500); }
        .tl-title { font-size: 13.5px; font-weight: 600; color: var(--slate-800); }
        .tl-date { font-size: 11px; color: var(--slate-400); }
        .tl-note { font-size: 12.5px; color: var(--slate-500); margin-top: 4px; }
        .doc-row { display: flex; align-items: center; justify-content: space-between; background: var(--slate-50); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .doc-row .di { display: flex; align-items: center; gap: 10px; font-size: 13.5px; font-weight: 600; color: var(--blue-800); }
        .fee-row { display: flex; align-items: center; gap: 12px; background: var(--slate-50); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; flex-wrap: wrap; }
        .fee-row .amt { font-weight: 700; font-size: 15px; color: var(--blue-900); min-width: 90px; }
        .fee-row .lbl { flex: 1; font-size: 13px; color: var(--slate-700); }
        .fee-row .status { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .note-item { background: var(--slate-50); border-left: 3px solid var(--blue-500); border-radius: 0 8px 8px 0; padding: 12px 16px; margin-bottom: 8px; }
        .note-item .meta { font-size: 11px; color: var(--slate-400); margin-bottom: 4px; }
        .note-item .text { font-size: 13px; color: var(--slate-700); }
        .progress-stages { display: flex; gap: 0; margin-bottom: 20px; overflow-x: auto; }
        .stage { flex: 1; min-width: 90px; text-align: center; padding: 10px 6px; font-size: 11px; font-weight: 600; color: var(--slate-400); background: var(--slate-100); border-right: 2px solid #fff; position: relative; }
        .stage:last-child { border-right: none; }
        .stage.done { background: var(--emerald-50); color: var(--emerald-600); }
        .stage.active { background: var(--blue-800); color: #fff; }
        .stage.rejected { background: var(--rose-50); color: var(--rose-600); }
        .stage .stage-icon { display: block; font-size: 16px; margin-bottom: 4px; }
        .modal-tab { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 2px solid var(--slate-200); }
        .modal-tab button { padding: 10px 18px; font-size: 12.5px; font-weight: 600; color: var(--slate-500); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); }
        .modal-tab button.active { color: var(--blue-800); border-bottom-color: var(--blue-800); }
        .modal-tab button:hover { color: var(--blue-600); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .admin-topbar { background: var(--blue-950); color: #fff; padding: 14px 0; position: sticky; top: 0; z-index: 100; }
        .admin-topbar .wrap { display: flex; justify-content: space-between; align-items: center; }
        .admin-topbar .brand { font-family: var(--font-head); font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .admin-topbar a { color: #B9C8DC; transition: var(--transition); font-size: 13px; }
        .admin-topbar a:hover { color: #fff; }

        .auth-shell { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 120px); padding: 40px 20px; }
        .auth-shell .card { max-width: 420px; width: 100%; }
        .auth-icon { width: 56px; height: 56px; border-radius: 14px; background: var(--maroon-50); color: var(--maroon-600); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }

        .phone-wrapper { display: flex; gap: 8px; }
        .phone-wrapper select { width: 140px; flex-shrink: 0; }

        @media (max-width: 900px) {
            .dash-shell { grid-template-columns: 1fr; }
            .dash-side { display: flex; overflow: auto; gap: 4px; padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--slate-200); }
            .dash-side .side-title { display: none; }
            .msg-shell { grid-template-columns: 1fr; }
            .msg-list-panel { display: none; }
            .msg-list-panel.show { display: block; position: fixed; inset: 72px 0 0; z-index: 100; background: #fff; }
            .msg-chat-panel { display: none; }
            .msg-chat-panel.show { display: flex; }
            .stat-grid { grid-template-columns: repeat(2,1fr) !important; }
            .dash-main { padding: 16px 12px; }
            .chip { padding: 6px 14px; font-size: 11.5px; }
            .modal { margin: 8px; border-radius: 10px; }
            .modal-body { padding: 14px; }
            .modal-body .grid { grid-template-columns: 1fr !important; }
            .search-input input { min-width: 120px; }
            .wrap { padding: 0 14px; }
            table { font-size: 12px; }
            .modal-tab { overflow-x: auto; flex-wrap: nowrap; }
            .modal-tab button { padding: 8px 12px; font-size: 11px; white-space: nowrap; }
            .progress-stages .stage { min-width: 60px; font-size: 9px; padding: 6px 2px; }
            .fee-row { flex-wrap: wrap; gap: 6px; }
            .fee-row .amt { min-width: 60px; font-size: 13px; }
            .app-table { width: 100%; }
            .app-card-row { display: none; }
            .completeness-bar { height: 5px; background: var(--slate-100); border-radius: 99px; overflow: hidden; min-width: 60px; }
            .completeness-bar .fill { height: 100%; border-radius: 99px; transition: width .5s; }
            .completeness-bar .fill.green { background: var(--emerald-500); }
            .completeness-bar .fill.amber { background: var(--amber-500); }
            .completeness-bar .fill.maroon { background: var(--maroon-500); }
        }
        @media (max-width: 600px) {
            .app-table { display: none; }
            .app-card-row { display: block; }
            .app-card { background: #fff; border: 1px solid var(--slate-200); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
            .app-card .ac-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
            .app-card .ac-name { font-weight: 700; color: var(--blue-900); font-size: 14px; }

            .app-card .ac-meta span { display: flex; align-items: center; gap: 4px; }
            .app-card .ac-meta i { color: var(--slate-400); width: 14px; text-align: center; font-size: 11px; }
            .app-card .ac-foot { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--slate-100); padding-top: 10px; }
        }
    </style>
</head>

    function calcCompleteness(a) {
        const fields=[a.fullName,a.email,a.phone,a.nationality,a.dob,a.passportNumber,a.education,a.jobTitle,a.country];
        const f=fields.filter(Boolean).length;
        const cv=!!a.cvUrl,pass=!!a.passportUrl,cert=!!a.certificatesUrl,ref=!!a.referenceUrl,med=!!a.medicalUrl;
        const cvV=!!a.documentsVerified?.cv,passV=!!a.documentsVerified?.passport,certV=!!a.documentsVerified?.certificates,refV=!!a.documentsVerified?.reference,medV=!!a.documentsVerified?.medical;
        let score=f; if(cv)score++; if(pass)score++; if(cert)score++; if(ref)score++; if(med)score++;
        if(cvV)score++; if(passV)score++; if(certV)score++; if(refV)score++; if(medV)score++;
        return Math.min(100,Math.round((Math.min(score,17)/17)*100));
    }

    function getStageRequirements(a, stageIdx) {
        const reqs=[
            {label:'Personal info complete (name, email, phone, nationality)', met:!!(a.fullName&&a.email&&a.phone&&a.nationality)},
            {label:'CV uploaded', met:!!a.cvUrl},
            {label:'Passport uploaded', met:!!a.passportUrl},
            {label:'Job selected', met:!!(a.jobTitle&&a.country)},
            {label:'Education & experience provided', met:!!(a.education||a.workExperience)}
        ];
        if(stageIdx>=1){
            reqs.push({label:'CV verified by admin', met:!!a.documentsVerified?.cv});
            reqs.push({label:'Passport verified by admin', met:!!a.documentsVerified?.passport});
        }
        if(stageIdx>=2){
            reqs.push({label:'Certificates verified', met:!!a.documentsVerified?.certificates});
            reqs.push({label:'Reference letter verified', met:!!a.documentsVerified?.reference});
        }
        if(stageIdx>=3) reqs.push({label:'Employer matched & interview completed', met:!!(a.timeline||[]).some(t=>t.status==='Employer Matching & Interview')});
        if(stageIdx>=4){
            reqs.push({label:'Job offer extended & contract signed', met:!!(a.timeline||[]).some(t=>t.status==='Job Offer & Contract Signing')});
            reqs.push({label:'Contract documents uploaded', met:!!a.contractUrl});
        }
        if(stageIdx>=5){
            reqs.push({label:'Medical report uploaded', met:!!a.medicalUrl});
            reqs.push({label:'Reference letters uploaded', met:!!a.referenceUrl});
            reqs.push({label:'Certificates uploaded', met:!!a.certificatesUrl});
        }
        if(stageIdx>=6){
            reqs.push({label:'Medical report cleared', met:!!a.documentsVerified?.medical});
            reqs.push({label:'Police clearance submitted', met:!!a.policeClearanceUrl});
        }
        if(stageIdx>=7) reqs.push({label:'Travel & deployment arranged', met:!!(a.timeline||[]).some(t=>t.status==='Travel & Deployment')});
        return reqs;
    }
    function checkAutoAdvance(a) {
        const cur=STATUS_STEPS.indexOf(a.status);
        if(cur<0||cur>=STATUS_STEPS.length-1)return null;
        const reqs=getStageRequirements(a,cur);
        const allMet=reqs.every(r=>r.met);
        if(!allMet)return null;
        const next=STATUS_STEPS[cur+1];
        return next;
    }

                            <div style="font-size:11px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Education</div><div style="font-size:13.5px;font-weight:600">${esc(app.education||'—')}</div></div>
                            <div><div style="font-size:11px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Position</div><div style="font-size:13.5px;font-weight:600;margin-bottom:10px">${esc(app.jobTitle)}</div>
                            <div style="font-size:11px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Country</div><div style="font-size:13.5px;font-weight:600;margin-bottom:10px">${esc(app.country)}</div>
                            <div style="font-size:11px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Passport No.</div><div style="font-size:13.5px;font-weight:600">${esc(app.passportNumber||'—')}</div></div>

                        ${app.coverLetter?`<div style="background:var(--slate-50);border-radius:8px;padding:12px 16px;margin-bottom:10px"><div style="font-size:11px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px">Cover Letter / Notes</div><div style="font-size:13px;color:var(--slate-700)">${esc(app.coverLetter)}</div></div>`:''}
                        ${app.workExperience?`<div style="background:var(--slate-50);border-radius:8px;padding:12px 16px"><div style="font-size:11px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px">Work Experience</div><div style="font-size:13px;color:var(--slate-700)">${esc(app.workExperience)}</div></div>`:''}
                    </div>

                    <!-- TAB: Documents -->
                    <div class="tab-panel" data-tab="docs">
                        <h4 style="margin:0 0 12px;color:var(--blue-900);font-size:14px">Uploaded Documents</h4>
                        ${[
                            {key:'cv',label:'CV / Resume',icon:'fa-file-lines',url:app.cvUrl},
                            {key:'passport',label:'Passport Copy',icon:'fa-passport',url:app.passportUrl},
                            {key:'certificates',label:'Certificates',icon:'fa-certificate',url:app.certificatesUrl},
                            {key:'reference',label:'Reference Letter',icon:'fa-envelope',url:app.referenceUrl},
                            {key:'medical',label:'Medical Report',icon:'fa-heart-pulse',url:app.medicalUrl}
                        ].map(d=>{
                            const verified=app.documentsVerified?.[d.key];
                            return `<div class="doc-row"><div class="di"><i class="fa-solid ${d.icon}"></i> ${d.label}</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${d.url?`<a href="${d.url}" target="_blank" class="btn btn-outline btn-sm">View</a>`:'<span class="badge badge-slate">Not uploaded</span>'}<label style="font-size:12px;display:flex;align-items:center;gap:4px"><input type="checkbox" class="doc-verify-cb" data-dockey="${d.key}" ${verified?'checked':''}> Verified</label></div></div>`;
                        }).join("")}
                        <h4 style="margin:16px 0 12px;color:var(--blue-900);font-size:14px">Upload Document for Applicant</h4>
                        <div style="display:flex;gap:8px;flex-wrap:wrap">
                            <select id="adminDocType" style="width:auto;flex:1;min-width:140px">
                                <option value="certificatesUrl">Certificate</option>
                                <option value="referenceUrl">Reference Letter</option>
                                <option value="medicalUrl">Medical Report</option>
                                <option value="contractUrl">Contract Document</option>
                                <option value="otherUrl">Other</option>
                            </select>
                            <button class="btn btn-primary btn-sm" id="adminUploadDocBtn"><i class="fa-solid fa-upload"></i> Upload</button>
                        </div>
                    </div>

                    <!-- TAB: Fees -->
                    <div class="tab-panel" data-tab="fees">
                        <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
                            <div class="card pad" style="flex:1;min-width:120px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--blue-900)">${esc(appFees.length)}</div><div style="font-size:11px;color:var(--slate-500)">Fee Items</div></div>
                            <div class="card pad" style="flex:1;min-width:120px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--emerald-600)">${esc(totalPaid.toFixed(2))}</div><div style="font-size:11px;color:var(--slate-500)">Total Paid</div></div>
                            <div class="card pad" style="flex:1;min-width:120px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--maroon-600)">${esc(totalDue.toFixed(2))}</div><div style="font-size:11px;color:var(--slate-500)">Outstanding</div></div>
                        </div>
                        <div id="appFeesList">${appFees.length?appFees.map((f,i)=>`<div class="fee-row"><span class="lbl">${esc(f.label)}</span><span class="amt">${esc(f.amount)}</span><span class="status ${f.paid?'badge-green':'badge-amber'}">${f.paid?'Paid':'Unpaid'}</span>${f.paidDate?`<span style="font-size:11px;color:var(--slate-400)">${fmtDate(f.paidDate)}</span>`:''}<button class="btn btn-outline btn-sm" data-togglefee="${i}">${f.paid?'Unmark':'Mark Paid'}</button></div>`).join(""):'<div class="empty-state" style="padding:20px"><p>No fees added for this application yet.</p></div>'}</div>
                        <h4 style="margin:16px 0 10px;color:var(--blue-900);font-size:14px">Add Fee to Application</h4>
                        <div style="display:flex;gap:8px;flex-wrap:wrap">
                            <input type="text" id="newFeeLabel" placeholder="Fee label (e.g. Visa fee)" style="flex:2;min-width:140px">
                            <input type="text" id="newFeeAmount" placeholder="Amount (e.g. EUR 500)" style="flex:1;min-width:100px">
                            <button class="btn btn-primary btn-sm" id="addAppFeeBtn"><i class="fa-solid fa-plus"></i> Add</button>
                        </div>
                    </div>

                    <!-- TAB: Services -->
                    <div class="tab-panel" data-tab="services">
                        <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
                            <div class="card pad" style="flex:1;min-width:120px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--blue-900)">${(app.clientServices||[]).length}</div><div style="font-size:11px;color:var(--slate-500)">Total Services</div></div>
                            <div class="card pad" style="flex:1;min-width:120px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--emerald-600)">${(app.clientServices||[]).filter(s=>s.status==='completed').length}</div><div style="font-size:11px;color:var(--slate-500)">Completed</div></div>
                            <div class="card pad" style="flex:1;min-width:120px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--maroon-600)">${(app.clientServices||[]).filter(s=>s.paid).reduce((s,f)=>s+(parseFloat(f.amount)||0),0).toFixed(0)}</div><div style="font-size:11px;color:var(--slate-500)">EUR Collected</div></div>
                        </div>
                        <div id="appServicesList">${(app.clientServices||[]).length?(app.clientServices||[]).map((s,i)=>{
                            const t=SERVICE_TYPES.find(st=>st.id===s.type);
                            const ico=t?t.icon:'fa-handshake';
                            const col=t?t.color:'var(--slate-500)';
                            const stCls=s.status==='completed'?'badge-green':s.status==='in-progress'?'badge-amber':s.status==='cancelled'?'badge-rose':'badge-slate';
                            return `<div style="background:var(--slate-50);border-radius:8px;padding:12px 14px;margin-bottom:8px">
                                <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
                                    <div style="display:flex;align-items:center;gap:8px">
                                        <span style="width:32px;height:32px;border-radius:8px;background:${col}20;color:${col};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0"><i class="fa-solid ${ico}"></i></span>
                                        <div><div style="font-weight:700;font-size:13px;color:var(--blue-900)">${esc(s.label)}</div>${s.description?`<div style="font-size:11.5px;color:var(--slate-500)">${esc(s.description)}</div>`:''}</div>
                                    </div>
                                    <span class="badge ${stCls}">${esc(s.status)}</span>
                                </div>
                                ${s.amount?`<div style="margin-top:6px;font-size:13px;font-weight:700;color:var(--blue-800)">${esc(s.amount)} ${s.paid?'<span class="badge badge-green">Paid</span>':'<span class="badge badge-amber">Unpaid</span>'}</div>`:''}
                                <div style="margin-top:6px;display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--slate-500);font-weight:600">${s.progress||0}%</span><input type="range" min="0" max="100" value="${s.progress||0}" class="svc-progress" data-svcidx="${i}" style="flex:1;max-width:160px;height:4px"></div>
                                <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
                                    <select class="svc-status-select" data-svcidx="${i}" style="width:auto;min-width:100px;padding:5px 8px;font-size:11px">
                                        <option value="pending" ${s.status==='pending'?'selected':''}>Pending</option>
                                        <option value="in-progress" ${s.status==='in-progress'?'selected':''}>In Progress</option>
                                        <option value="completed" ${s.status==='completed'?'selected':''}>Completed</option>
                                        <option value="cancelled" ${s.status==='cancelled'?'selected':''}>Cancelled</option>
                                    </select>
                                    <button class="btn btn-outline btn-sm svc-toggle-paid" data-svcidx="${i}">${s.paid?'Unmark Paid':'Mark Paid'}</button>
                                </div>
                            </div>`;
                        }).join(""):'<div class="empty-state" style="padding:20px"><p>No services assigned to this client yet.</p></div>'}</div>
                        <h4 style="margin:16px 0 10px;color:var(--blue-900);font-size:14px">Add Service for This Client</h4>
                        <div style="display:flex;gap:8px;flex-direction:column">
                            <div style="display:flex;gap:8px;flex-wrap:wrap">
                                <select id="newServiceType" style="flex:2;min-width:180px">
                                    <option value="">Select service type...</option>
                                    ${SERVICE_TYPES.map(st=>`<option value="${st.id}">${st.label}</option>`).join("")}
                                </select>
                                <input type="text" id="newServiceAmount" placeholder="Amount (e.g. EUR 350)" style="flex:1;min-width:100px">
                            </div>
                            <div style="display:flex;gap:8px;flex-wrap:wrap">
                                <input type="text" id="newServiceLabel" placeholder="Custom label (optional)" style="flex:2;min-width:180px">
                                <input type="text" id="newServiceDesc" placeholder="Description (optional)" style="flex:3;min-width:200px">
                            </div>
                            <button class="btn btn-primary btn-sm" id="addServiceBtn"><i class="fa-solid fa-plus"></i> Add Service</button>
                        </div>
                    </div>

                    <!-- TAB: Notes -->
                    <div class="tab-panel" data-tab="notes">
                        <div id="appNotesList">${appNotes.length?appNotes.map(n=>`<div class="note-item"><div class="meta">${esc(n.author||'Admin')} · ${fmtDate(n.createdAt)}</div><div class="text">${esc(n.text)}</div></div>`).join(""):'<div class="empty-state" style="padding:20px"><p>No internal notes yet.</p></div>'}</div>
                        <div style="display:flex;gap:8px;margin-top:12px">
                            <textarea id="newNoteText" rows="2" placeholder="Add an internal note about this application..." style="flex:1"></textarea>
                            <button class="btn btn-primary btn-sm" id="addNoteBtn" style="align-self:flex-end"><i class="fa-solid fa-plus"></i> Add Note</button>
                        </div>
                    </div>

                    <!-- TAB: Timeline -->
                    <div class="tab-panel" data-tab="timeline">
                        <h4 style="margin:0 0 12px;color:var(--blue-900);font-size:14px">Update Status</h4>
                        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">${ALL_STATUSES.map(s=>`<button class="chip ${app.status===s?'active':''}" data-setstatus="${esc(s)}">${s}</button>`).join("")}</div>
                        <div class="field"><label>Status Note</label><textarea id="statusNote" rows="2" placeholder="Optional note for this status change..."></textarea></div>
                        ${(()=>{
                            const autoNext=checkAutoAdvance(app);
                            if(autoNext){
                                return `<div style="background:var(--emerald-50);border:1px solid #bfe6cc;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
                                    <span style="font-size:13px;font-weight:600;color:#065F46"><i class="fa-solid fa-circle-check" style="color:var(--emerald-600)"></i> All requirements met for current stage.</span>
                                    <button class="btn btn-success btn-sm" id="autoAdvanceBtn">Advance to "${esc(autoNext)}" <i class="fa-solid fa-arrow-right"></i></button>
                                </div>`;
                            }
                            return '';
                        })()}
                        <h4 style="margin:18px 0 12px;color:var(--blue-900);font-size:14px">Stage Requirements</h4>
                        <div style="background:var(--slate-50);border-radius:8px;padding:12px 16px;margin-bottom:16px">
                            ${(()=>{
                                const cur=STATUS_STEPS.indexOf(app.status);
                                const idx=Math.max(0,cur);
                                const reqs=getStageRequirements(app,idx);
                                const met=reqs.filter(r=>r.met).length;
                                return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                                    <span style="font-size:12px;font-weight:700;color:var(--slate-600)">Requirements for "${esc(STATUS_STEPS[idx]||app.status)}"</span>
                                    <span style="font-size:12px;color:var(--slate-500)">${met}/${reqs.length}</span>
                                </div>
                                ${reqs.map(r=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12.5px;color:${r.met?'var(--emerald-600)':'var(--slate-500)'}"><i class="fa-solid ${r.met?'fa-circle-check':'fa-circle-regular'}" style="font-size:11px"></i> ${esc(r.label)}</div>`).join("")}`;
                            })()}
                        </div>
                        <h4 style="margin:18px 0 12px;color:var(--blue-900);font-size:14px">Application Timeline</h4>
                        ${renderTimeline(app)}
                    </div>
                </div>
                <div class="modal-foot" style="flex-wrap:wrap">
                    <button class="btn btn-outline btn-sm" id="archiveBtn"><i class="fa-solid fa-box-archive"></i> Archive</button>
                    <button class="btn ${app.blocked?'btn-success':'btn-danger'} btn-sm" id="deleteAccountBtn"><i class="fa-solid ${app.blocked?'fa-unlock':'fa-ban'}"></i> ${app.blocked?'Unblock':'Block'} Account</button>
                    <button class="btn btn-primary btn-sm" id="startChatBtn" data-startchat="${app.uid}" data-chatname="${app.fullName}"><i class="fa-solid fa-comment-dots"></i> Chat</button>
                    <button class="btn btn-maroon btn-sm" id="saveModalBtn"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
                    <button class="btn btn-danger btn-sm" id="deleteAppBtn"><i class="fa-solid fa-trash-can"></i> Delete</button>
                </div>
            </div>
        </div>`;
        document.getElementById('modalCloseBtn').addEventListener('click',()=>root.innerHTML='');
        document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')root.innerHTML=''});

        // Tab switching
        document.querySelectorAll('[data-mtab]').forEach(b=>b.addEventListener('click',function(){
            document.querySelectorAll('[data-mtab]').forEach(x=>x.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
            document.querySelector(`.tab-panel[data-tab="${this.getAttribute('data-mtab')}"]`).classList.add('active');
        }));

        // Archive
        document.getElementById('archiveBtn').addEventListener('click',async()=>{
            if(!confirm("Archive this application?"))return;
            await updateDoc(doc(db,"applications",appId(app)),{archived:true,updatedAt:serverTimestamp()});
            toast("Archived.","ok");root.innerHTML='';await loadApps();
        });

        // Delete / Block Account
        document.getElementById('deleteAccountBtn').addEventListener('click',async()=>{
            const email=app.email||'';
            const name=app.fullName||'this user';
            const id=appId(app);
            if(app.blocked){
                if(!confirm(`UNBLOCK ${name} (${email})? They will regain platform access.`))return;
                await updateDoc(doc(db,"applications",id),{blocked:false,blockedAt:null,blockedBy:null,updatedAt:serverTimestamp()});
                try{addAuditLog(`Unblocked account`,`${name} (${email})`,id);}catch(e){}
                toast(`✅ ${name} has been unblocked.`,"ok");
            }else{
                if(!confirm(`BLOCK ${name} (${email})? They will no longer be able to access the platform.`))return;
                if(!confirm(`⚠️ ARE YOU SURE? This will mark ${email} as blocked. Type "BLOCK" to confirm.`))return;
                await updateDoc(doc(db,"applications",id),{blocked:true,blockedAt:new Date().toISOString(),blockedBy:currentUserData?.email||'Admin',updatedAt:serverTimestamp()});
                try{addAuditLog(`Blocked account`,`${name} (${email})`,id);}catch(e){}
                toast(`🔇 ${name} has been blocked.`,"ok");
            }
            root.innerHTML='';await loadApps();
        });

        // Delete application permanently
        document.getElementById('deleteAppBtn').addEventListener('click',async()=>{
            if(!confirm(`⚠️ DELETE application for ${app.fullName||'this user'} (${appId(app)})? This permanently removes ALL data including chats and messages. Cannot be undone.`))return;
            if(!confirm(`FINAL CONFIRMATION: Delete ${app.fullName||'this user'}'s application forever?`))return;
            try{
                const id=app.id||app.uid;
                if(id)await deleteDoc(doc(db,"applications",id)).catch(()=>{});
                const chatsSnap=await getDocs(query(collection(db,"chats"),where("participants","array-contains",app.uid)));
                for(const chatDoc of chatsSnap.docs){
                    const msgsSnap=await getDocs(query(collection(db,"messages"),where("chatId","==",chatDoc.id)));
                    msgsSnap.forEach(m=>m.ref.delete().catch(()=>{}));
                    chatDoc.ref.delete().catch(()=>{});
                }
                try{addAuditLog(`Deleted application`,`${app.fullName} (${appId(app)})`);}catch(e){}
                toast("Application permanently deleted.","ok");
                root.innerHTML='';await loadApps();
            }catch(e){toast("Delete error: "+e.message,"err");}
        });

        // Chat
        document.getElementById('startChatBtn').addEventListener('click',async()=>{
            const uid=document.getElementById('startChatBtn').getAttribute('data-startchat');
            const name=document.getElementById('startChatBtn').getAttribute('data-chatname')||uid;
            const chat=await getOrCreateChat(uid,name);
            if(chat)navigate("messages-chat",{chatId:chat.id,otherName:name});
            root.innerHTML='';
        });

        // Save: status + doc verification
        document.getElementById('saveModalBtn').addEventListener('click',async()=>{
            const id=appId(app);
            const ref=doc(db,"applications",id);
            const dv={};
            document.querySelectorAll('.doc-verify-cb').forEach(cb=>{dv[cb.getAttribute('data-dockey')]=cb.checked;});
            const updates={documentsVerified:dv,updatedAt:serverTimestamp()};
            const selectedStatus=document.querySelector('[data-setstatus].active');
            if(selectedStatus){
                const newStatus=selectedStatus.getAttribute('data-setstatus');
                if(newStatus!==app.status){
                    updates.status=newStatus;
                    const note=document.getElementById('statusNote').value.trim();
                    const tlEntry={status:newStatus,date:new Date().toISOString(),note:note||`Status updated to "${newStatus}".`};
                    if(app.timeline) updates.timeline=arrayUnion(tlEntry);
                    else updates.timeline=[tlEntry];
                    // Auto-send notification to applicant's chat
                    try{sendAppStatusNotification(app.uid,app.fullName,newStatus,note);}catch(e){}
                }
            }
            await updateDoc(ref,updates);
            const changedStatus=selectedStatus&&selectedStatus.getAttribute('data-setstatus')!==app.status;
            try{addAuditLog(changedStatus?`Status → ${selectedStatus.getAttribute('data-setstatus')}`:'Documents verified',`${app.fullName} (${appId(app)})`,id);}catch(e){}
            toast("Application updated.","ok");root.innerHTML='';await loadApps();
        });

        // Status chip toggle
        document.querySelectorAll('[data-setstatus]').forEach(b=>b.addEventListener('click',function(){
            document.querySelectorAll('[data-setstatus]').forEach(x=>x.classList.remove('active'));
            this.classList.add('active');
        }));

        // Auto-advance
        document.getElementById('autoAdvanceBtn')?.addEventListener('click',async()=>{
            const next=checkAutoAdvance(app);
            if(!next){toast("Requirements not met for auto-advance.","err");return;}
            document.querySelectorAll('[data-setstatus]').forEach(x=>x.classList.remove('active'));
            document.querySelector(`[data-setstatus="${esc(next)}"]`)?.classList.add('active');
            document.getElementById('statusNote').value=`Auto-advanced: all requirements met for "${app.status}".`;
            document.getElementById('saveModalBtn').click();
        });

        // Fee toggle (mark paid/unpaid)
        document.querySelectorAll('[data-togglefee]').forEach(b=>b.addEventListener('click',async function(){
            const idx=parseInt(this.getAttribute('data-togglefee'));
            const id=appId(app);
            const ref=doc(db,"applications",id);
            const s=await getDoc(ref);
            if(!s.exists())return;
            const data=s.data(),fees=[...(data.fees||[])];
            if(!fees[idx])return;
            fees[idx].paid=!fees[idx].paid;

    async function sendSystemNotification(uid,name,msgText){
        if(!currentUser)return;
        const chat=await getOrCreateChat(uid,name);
        if(!chat)return;
        const mr=doc(collection(db,"messages"));
        await setDoc(mr,{chatId:chat.id,senderId:currentUser.uid,senderName:'Admin',text:msgText,fileUrl:'',fileName:'',timestamp:serverTimestamp()});
        const cr=doc(db,"chats",chat.id),cs=await getDoc(cr),cd=cs.data();
        const ou=cd.participants.find(p=>p!==currentUser.uid),un=cd.unread||{};
        un[ou]=(un[ou]||0)+1;
        await updateDoc(cr,{lastMessage:msgText,lastTimestamp:serverTimestamp(),unread:un});
    }

        if(fileBtn){
            fileBtn.addEventListener('click',()=>{
                const dialog=uploadcare.openDialog(null,{publicKey:UPLOADCARE_PUBLIC_KEY,multiple:false,imgOnly:false});
                dialog.done((file)=>{
                    file.promise().then((info)=>{
                        if(info.size&&info.size>10*1024*1024){toast("File too large (max 10MB).","err");return;}
                        const url=info.cdnUrl;
                        sendMessage(chatId,'',url,info.name||'File');
                    }).catch(()=>toast("Upload failed.","err"));
                });
                dialog.fail(()=>toast("Upload cancelled.","err"));
            });
        }
        const svcBtn=document.getElementById('sendServiceOfferBtn');
        if(svcBtn){
            svcBtn.addEventListener('click',async()=>{
                const uid=ROUTE.params.chatId ? allChats.find(c=>c.id===ROUTE.params.chatId)?.otherUid : null;
                if(!uid){toast("Cannot identify user.","err");return;}
                const msgText='🛎️ We have new assistance services available for you! Please check your dashboard → My Portal → Assistance Services section for details and payment options. Reply if you have any questions.';
                sendMessage(chatId,msgText,'','');
                toast("Service offer sent!","ok");
            });
        }
        document.querySelectorAll('[data-chatid]').forEach(el=>el.addEventListener('click',function(){
            const id=this.getAttribute('data-chatid'),name=this.getAttribute('data-chatname')||"Chat";
            navigate("messages-chat",{chatId:id,otherName:name});
        }));
        // Avatar click → show applicant details
        document.querySelector('.msg-chat-header .msg-avatar')?.addEventListener('click',()=>showUserDetails(otherName));
    }

    function showUserDetails(userName){
        const uid=ROUTE.params.chatId ? allChats.find(c=>c.id===ROUTE.params.chatId)?.otherUid : null;
        if(!uid){toast("User details not available.","err");return;}
        let app=allApps.find(a=>a.uid===uid);
        if(!app){toast("No application found for this user.","err");return;}
        const root=document.getElementById('modal-root');
        root.innerHTML=`
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" style="max-width:500px">
                <div class="modal-head"><h3>${esc(app.fullName||userName)}</h3><button class="modal-close" id="modalCloseBtn"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="modal-body">
                    <div style="display:flex;gap:20px;margin-bottom:16px;align-items:center">
                        <div class="msg-avatar" style="width:52px;height:52px;font-size:22px">${esc((app.fullName||userName).charAt(0).toUpperCase())}</div>
                        <div><div style="font-size:16px;font-weight:700;color:var(--blue-900)">${esc(app.fullName||userName)}</div><div style="font-size:13px;color:var(--slate-500)">${esc(app.email||'')}</div></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;line-height:1.8">
                        <div><b>Phone:</b> ${esc(app.phone||'—')}</div>
                        <div><b>Nationality:</b> ${esc(app.nationality||'—')}</div>
                        <div><b>Position:</b> ${esc(app.jobTitle||'—')}</div>
                        <div><b>Country:</b> ${esc(app.country||'—')}</div>
                        <div><b>Status:</b> ${statusBadge(app.status)}</div>
                        <div><b>Passport:</b> ${esc(app.passportNumber||'—')}</div>
                    </div>
                    ${app.cvUrl?`<div style="margin-top:14px"><a href="${app.cvUrl}" target="_blank" class="btn btn-outline btn-sm"><i class="fa-solid fa-file-lines"></i> View CV</a></div>`:''}
                    <div style="margin-top:14px"><button class="btn btn-primary btn-sm" data-openapp="${appId(app)}"><i class="fa-solid fa-arrow-right"></i> Open Full Application</button></div>
                </div>
                <div class="modal-foot"><button class="btn btn-outline btn-sm" id="modalCloseBtn2">Close</button></div>
            </div>
        </div>`;
        document.getElementById('modalCloseBtn').addEventListener('click',()=>root.innerHTML='');
        document.getElementById('modalCloseBtn2')?.addEventListener('click',()=>root.innerHTML='');
        document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')root.innerHTML=''});
        const openBtn=root.querySelector('[data-openapp]');
        if(openBtn)openBtn.addEventListener('click',()=>{root.innerHTML='';openAppModal(openBtn.getAttribute('data-openapp'));});
    }

    function renderMessagesChat(chatId,messages) {
        const body=document.getElementById('msgChatBody');
        if(!body)return;
        currentChatMessages=messages||[];
        const chatIdCapture=chatId;
        body.innerHTML=currentChatMessages.length?(msgHasMore?`<div class="load-older-wrap" style="text-align:center;padding:8px 0"><button class="btn btn-outline btn-sm" id="loadOlderBtn"><i class="fa-solid fa-chevron-up"></i> Load older messages</button></div>`:'')+currentChatMessages.map(m=>{
            const sent=(m.senderId||m.sender)===currentUser?.uid;
            const senderDisplay=m.senderName||(sent?'Admin':(ROUTE.params.otherName||'User'));
            return `<div class="msg-bubble ${sent?'sent':'rec'}">${sent?'':`<div style="font-size:10px;font-weight:700;color:var(--blue-700);margin-bottom:2px">${esc(senderDisplay)}</div>`}<div>${esc(m.text||'')}${m.fileUrl?`<div class="msg-file"><i class="fa-solid fa-paperclip"></i><a href="${m.fileUrl}" target="_blank">${esc(m.fileName||'File')}</a></div>`:''}</div><div class="msg-time">${fmtDate(m.timestamp)}</div></div>`;
        }).join(""):`<div class="msg-empty"><div><i class="fa-solid fa-comment-dots"></i><p>No messages yet. Start the conversation!</p></div></div>`;
        const loadBtn=document.getElementById('loadOlderBtn');
        if(loadBtn)loadBtn.addEventListener('click',()=>loadOlderMessages(chatIdCapture));
        body.scrollTop=body.scrollHeight;
    }

    // ============= DATA & HELPERS =============
    async function getAdminUser(uid) { try{const d=await getDoc(doc(db,"admins",uid));if(d.exists())return{id:d.id,...d.data()};}catch(e){}return null; }
    async function getApp(appId) { try{const d=await getDoc(doc(db,"applications",appId));if(d.exists())return{id:d.id,...d.data()};}catch(e){}return null; }

    async function loadApps() {
        getDocs(collection(db,"applications")).then(s=>{const l=[];s.forEach(d=>l.push({id:d.id,...d.data()}));allApps=l;if(ROUTE.view==="dashboard")render();}).catch(()=>{});
    }
    let unsubscribeApps=null;
    function subscribeApps() {
        if(unsubscribeApps)unsubscribeApps();
        unsubscribeApps=onSnapshot(collection(db,"applications"),(snapshot)=>{allApps=[];snapshot.forEach(d=>allApps.push({id:d.id,...d.data()}));if(ROUTE.view==="dashboard")render();});
    }

    async function loadJobs() {
        if(!allJobs.length){allJobs=[];computeCountryCounts();}
        getDocs(collection(db,"jobs")).then(s=>{const l=[];s.forEach(d=>l.push({id:d.id,...d.data()}));if(l.length){allJobs=l;computeCountryCounts();if(["jobs","dashboard"].includes(ROUTE.view))render();}}).catch(()=>{});
    }

    async function loadFees() {
        getDocs(collection(db,"fees")).then(s=>{const l=[];s.forEach(d=>l.push({id:d.id,...d.data()}));allFees=l;if(ROUTE.view==="fees")render();}).catch(()=>{});
    }

    async function addJob(d){const r=doc(collection(db,"jobs"));await setDoc(r,{...d,createdAt:serverTimestamp()});await loadJobs();}
    async function deleteJob(i){await deleteDoc(doc(db,"jobs",i));await loadJobs();}
    async function addFee(d){const r=doc(collection(db,"fees"));await setDoc(r,{...d,createdAt:serverTimestamp()});await loadFees();}
    async function deleteFee(i){await deleteDoc(doc(db,"fees",i));await loadFees();}

    function computeCountryCounts(){}

    async function loadChats() {
        if(!currentUser)return;
        const q=query(collection(db,"chats"),where("participants","array-contains",currentUser.uid));
        getDocs(q).then(s=>{allChats=[];s.forEach(d=>{const dt=d.data(),ou=dt.participants?.find(p=>p!==currentUser.uid),on=ou?(dt.participantNames?.[ou]||ou):"Unknown";allChats.push({id:d.id,...dt,otherUid:ou,otherName:on});});allChats.sort((a,b)=>{const ta=a.lastTimestamp?new Date(a.lastTimestamp.seconds?a.lastTimestamp.seconds*1000:a.lastTimestamp):new Date(0),tb=b.lastTimestamp?new Date(b.lastTimestamp.seconds?b.lastTimestamp.seconds*1000:b.lastTimestamp):new Date(0);return tb-ta;});if(["messages","messages-chat"].includes(ROUTE.view))render();}).catch(()=>{});
    }

    function subscribeChats() {
        if(!currentUser)return;
        const q=query(collection(db,"chats"),where("participants","array-contains",currentUser.uid));
        if(allMessagesSub)allMessagesSub();
        allMessagesSub=onSnapshot(q,(s)=>{allChats=[];s.forEach(d=>{const dt=d.data(),ou=dt.participants?.find(p=>p!==currentUser.uid),on=ou?(dt.participantNames?.[ou]||ou):"Unknown";allChats.push({id:d.id,...dt,otherUid:ou,otherName:on});});allChats.sort((a,b)=>{const ta=a.lastTimestamp?new Date(a.lastTimestamp.seconds?a.lastTimestamp.seconds*1000:a.lastTimestamp):new Date(0),tb=b.lastTimestamp?new Date(b.lastTimestamp.seconds?b.lastTimestamp.seconds*1000:b.lastTimestamp):new Date(0);return tb-ta;});if(ROUTE.view==="messages"||ROUTE.view==="messages-chat")render();});
    }

    function subscribeMessages(chatId) {
        olderMessages=[];msgEarliestTimestamp=null;msgHasMore=false;
        const q=query(collection(db,"messages"),where("chatId","==",chatId),orderBy("timestamp","asc"),limitToLast(PAGE_SIZE));
        return onSnapshot(q,(s)=>{const msgs=[];s.forEach(d=>msgs.push({id:d.id,...d.data()}));if(olderMessages.length===0){if(msgs.length===PAGE_SIZE)msgEarliestTimestamp=msgs[0].timestamp;msgHasMore=msgs.length===PAGE_SIZE;}renderMessagesChat(chatId,[...olderMessages,...msgs]);markChatRead(chatId);},(error)=>{console.error("Messages subscription error:",error);toast("Error loading messages. "+(error.code==='failed-precondition'?'A Firestore composite index is required.':'Please try again.'),"err");});
    }

    async function loadOlderMessages(chatId) {
        if(!msgEarliestTimestamp)return;
        const q=query(collection(db,"messages"),where("chatId","==",chatId),orderBy("timestamp","desc"),limit(PAGE_SIZE),startAfter(msgEarliestTimestamp));
        const snap=await getDocs(q);
        const older=[];snap.forEach(d=>older.push({id:d.id,...d.data()}));
        if(!older.length){msgHasMore=false;return;}
        older.reverse();msgEarliestTimestamp=older[0].timestamp;msgHasMore=older.length===PAGE_SIZE;
        olderMessages=[...older,...olderMessages];
        const body=document.getElementById('msgChatBody');
        if(body)body.querySelector('.load-older-wrap')?.remove();
        renderMessagesChat(chatId,[...olderMessages,...currentChatMessages]);
    }

    async function markChatRead(chatId) {
        try{const r=doc(db,"chats",chatId),s=await getDoc(r);if(s.exists()){const d=s.data(),u=d.unread||{};if(u[currentUser.uid]){u[currentUser.uid]=0;await updateDoc(r,{unread:u});}}}catch(e){}
    }

    function getUnreadCount() {
        if(!currentUser||!allChats.length)return 0;
        return allChats.reduce((s,c)=>s+((c.unread?.[currentUser.uid])||0),0);
    }

    async function getOrCreateChat(otherUid,otherName) {
        if(!currentUser)return null;
        const uid=currentUser.uid,chatId=[uid,otherUid].sort().join('_'),chatRef=doc(db,"chats",chatId);
        const existing=await getDoc(chatRef);
        if(existing.exists())return{id:existing.id,...existing.data()};
        const data={participants:[uid,otherUid],participantNames:{[uid]:currentUser.displayName||'Admin',[otherUid]:otherName},unread:{[uid]:0,[otherUid]:0},lastMessage:'',lastTimestamp:serverTimestamp(),createdAt:serverTimestamp()};
        await setDoc(chatRef,data);
        return {id:chatRef.id,...data};
    }

    async function sendMessage(chatId,text,fileUrl,fileName) {
        const r=doc(collection(db,"messages"));
        const msg={chatId,senderId:currentUser.uid,senderName:'Admin',text:text||'',type:fileUrl?'file':'text',fileUrl:fileUrl||'',fileName:fileName||'',read:false,timestamp:serverTimestamp()};
        await setDoc(r,msg);
        const cr=doc(db,"chats",chatId),cs=await getDoc(cr),cd=cs.data();
        const ou=cd.participants.find(p=>p!==currentUser.uid),un=cd.unread||{};
        un[ou]=(un[ou]||0)+1;
        await updateDoc(cr,{lastMessage:text||(fileUrl?`📎 ${fileName||'File'}`:''),lastTimestamp:serverTimestamp(),lastSender:currentUser.uid,unread:un});
        await loadChats();
    }

    // ============= AUTH =============
    onAuthStateChanged(auth,async(user)=>{
        try{
            currentUser=user;
            if(user){
                const fsAdmin=await getAdminUser(user.uid);
                if(fsAdmin){
                    currentUserData={...fsAdmin,type:'admin'};
                    document.getElementById('topbarUser').textContent=user.email;
                    await Promise.all([loadApps(),loadJobs(),loadFees(),loadChats()]);
                    subscribeChats();
                    subscribeApps();
                    navigate("dashboard");
                }else{
                    currentUser=null;currentUserData=null;
                    await signOut(auth);
                    toast("Not an admin. Access denied.","err");
                    navigate("login");
                }
            }else{
                currentUserData=null;allChats=[];currentChatMessages=[];
                document.getElementById('topbarUser').textContent='';
                if(allMessagesSub){allMessagesSub();allMessagesSub=null;}
                if(chatMessagesUnsub){chatMessagesUnsub();chatMessagesUnsub=null;}
                if(unsubscribeApps){unsubscribeApps();unsubscribeApps=null;}
                navigate("login");
            }
        }catch(e){console.error("Auth error:",e);}
    });

    // Boot
    try{await Promise.all([loadJobs(),loadFees()]);}catch(e){}
</script>
